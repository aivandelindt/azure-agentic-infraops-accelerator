# Upstream Sync
# This repository is a template consumer of jonathan-vella/azure-agentic-infraops.
# Upstream ALWAYS wins for framework files. Consumer-owned files are listed in EXCLUDE_PATHS.
# Synced folders become exact replicas â€” files deleted upstream are deleted here too.
#
# ALWAYS synced from upstream (upstream wins â€” exact replica):
#   .devcontainer/          .vscode/               .github/agents/
#   .github/skills/         .github/instructions/  .github/prompts/
#   .github/data/           .github/workflows/     .github/copilot-instructions.md
#   .github/CODEOWNERS      .github/ISSUE_TEMPLATE/ .github/PULL_REQUEST_TEMPLATE.md
#   scripts/                mcp/azure-pricing-mcp/
#   agent-output/           docs/                  infra/
#   Root config: lefthook.yml  commitlint.config.js  pyproject.toml
#     requirements.txt  .vale.ini  .vale/  .yamllint.yml
#     .markdownlint-cli2.jsonc  .markdown-link-check.json  .gitattributes
#
# NEVER synced (consumer-owned, excluded):
#   .github/workflows/weekly-upstream-sync.yml â†’ this workflow (unique to this repo)
#   README.md               â†’ consumer project README
#   CHANGELOG.md            â†’ consumer release history
#   VERSION.md              â†’ consumer version source of truth
#   CONTRIBUTING.md         â†’ consumer contribution guidelines
#   CONTRIBUTORS.md         â†’ consumer contributor credits
#   package.json            â†’ consumer package identity & version
#
# Exclusion matching: entries with trailing / use prefix match (directories),
# entries without trailing / use exact match (files). This prevents README.md
# from accidentally excluding README.md.bak, etc.
#
# NOTE: New upstream lint scripts in package.json won't auto-arrive.
# Review upstream diff manually during sync PR review.
#
# Runs weekly and on manual dispatch. Always opens a PR for human review â€” no auto-merge.

name: Upstream Sync

"on":
  schedule:
    # Run weekly on Sunday at 23:00 UTC
    - cron: "0 23 * * 0"
  workflow_dispatch:
    inputs:
      force_sync:
        description: "Run sync even if no changes are detected"
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  UPSTREAM_REPO: jonathan-vella/azure-agentic-infraops
  UPSTREAM_REF: main
  SYNC_BRANCH: automation/upstream-sync
  # Only these paths are excluded â€” everything else syncs from upstream.
  # Trailing / = directory (prefix match). No trailing / = file (exact match).
  EXCLUDE_PATHS: |
    .github/workflows/weekly-upstream-sync.yml
    node_modules/
    README.md
    CHANGELOG.md
    VERSION.md
    CONTRIBUTING.md
    CONTRIBUTORS.md
    package.json

jobs:
  sync:
    name: Sync Upstream Content
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream branch
        run: |
          git remote remove upstream 2>/dev/null || true
          git remote add upstream "https://github.com/${UPSTREAM_REPO}.git"
          git fetch upstream "${UPSTREAM_REF}" --prune

      - name: Apply upstream changes (upstream always wins)
        id: sync
        shell: bash
        run: |
          set -euo pipefail

          # Strategy: delete local-only files not in upstream (exact replica),
          # overlay everything from upstream, then restore excluded paths.
          # No merge = no conflicts. Upstream always wins unconditionally.

          # Helper: check if a file path matches any EXCLUDE_PATHS entry.
          # Trailing / entries use prefix match (directories).
          # Non-slash entries use exact match (files).
          is_excluded() {
            local file="$1"
            while IFS= read -r exc; do
              [ -z "$exc" ] && continue
              if [[ "$exc" == */ ]]; then
                [[ "$file" == "$exc"* ]] && return 0
              else
                [[ "$file" == "$exc" ]] && return 0
              fi
            done <<< "${EXCLUDE_PATHS}"
            return 1
          }

          BASE_SHA=$(git rev-parse HEAD)

          # Create (or reset) the sync branch from our current base
          git checkout -B "${SYNC_BRANCH}"

          # --- Deletion pass: remove files that exist locally but not upstream ---
          # This is what makes synced folders exact replicas.
          comm -23 \
            <(git ls-tree -r --name-only HEAD | sort) \
            <(git ls-tree -r --name-only "upstream/${UPSTREAM_REF}" | sort) \
          | while IFS= read -r file; do
            if is_excluded "$file"; then
              echo "  [skip] $file (excluded)"
              continue
            fi
            git rm --cached --ignore-unmatch -- "$file" > /dev/null 2>&1 || true
            rm -f -- "$file" 2>/dev/null || true
          done

          # --- Overlay pass: take everything from upstream ---
          git checkout "upstream/${UPSTREAM_REF}" -- .

          # --- Restore excluded paths from our base branch ---
          while IFS= read -r path; do
            [ -z "$path" ] && continue

            # Remove whatever upstream put in this path
            git rm -r --cached --ignore-unmatch -- "$path" > /dev/null 2>&1 || true
            rm -rf -- "$path" 2>/dev/null || true

            # Restore our base version (if the path existed in our repo)
            if git ls-tree --name-only "${BASE_SHA}" -- "$path" | grep -q .; then
              git checkout "${BASE_SHA}" -- "$path" 2>/dev/null || true
            fi
          done <<< "${EXCLUDE_PATHS}"

          # Detect whether anything changed relative to the base branch
          changed=false
          if ! git diff --quiet "${BASE_SHA}" -- || ! git diff --cached --quiet "${BASE_SHA}" --; then
            changed=true
          fi

          echo "base_sha=$BASE_SHA" >> "$GITHUB_OUTPUT"
          echo "changed=$changed" >> "$GITHUB_OUTPUT"

      - name: Log changed files
        if: steps.sync.outputs.changed == 'true'
        run: |
          echo "Files changed in this sync:"
          git diff --cached --name-only | head -100 | sed 's/^/  /'
          echo "  (showing first 100; may be more)"

      - name: Assert excluded paths are unchanged
        if: steps.sync.outputs.changed == 'true'
        run: |
          leaked=$(git diff --cached --name-only | grep -E '^(\.github/workflows/weekly-upstream-sync\.yml$|node_modules/|README\.md$|CHANGELOG\.md$|VERSION\.md$|CONTRIBUTING\.md$|CONTRIBUTORS\.md$|package\.json$)' || true)
          if [ -n "$leaked" ]; then
            echo "::error::Excluded paths were modified by sync."
            echo "$leaked" | sed 's/^/  /'
            exit 1
          fi

      - name: Skip when no changes are present
        if: steps.sync.outputs.changed != 'true' && github.event.inputs.force_sync != 'true'
        run: echo "No upstream changes after applying exclusions. Skipping PR."

      - name: Commit and push sync branch
        if: steps.sync.outputs.changed == 'true' || github.event.inputs.force_sync == 'true'
        run: |
          git add -A

          git commit -m "chore(sync): upstream sync from ${UPSTREAM_REPO}@${UPSTREAM_REF}

          Synced at $(date -u +"%Y-%m-%d %H:%M UTC")
          Exact replica sync â€” files deleted upstream are deleted here too.
          Excluded (consumer-owned): weekly-upstream-sync.yml README.md
            CHANGELOG.md VERSION.md CONTRIBUTING.md CONTRIBUTORS.md package.json" \
            --allow-empty

          set +e
          push_output=$(git push --force origin "${SYNC_BRANCH}" 2>&1)
          push_exit=$?
          set -e

          if [ "$push_exit" -ne 0 ]; then
            echo "$push_output"
            if echo "$push_output" | grep -q 'without `workflows` permission'; then
              echo "::error::Push failed because workflow files changed and GITHUB_TOKEN cannot update workflows in this repo policy."
              echo "::error::Use a PAT with workflow scope, or exclude .github/workflows/ from sync."
            fi
            exit "$push_exit"
          fi

      - name: Ensure PR labels exist
        if: steps.sync.outputs.changed == 'true' || github.event.inputs.force_sync == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create "automation" --color "0075ca" --description "Automated workflow changes" --repo "${{ github.repository }}" 2>/dev/null || true
          gh label create "upstream-sync" --color "e4e669" --description "Upstream template sync" --repo "${{ github.repository }}" 2>/dev/null || true

      - name: Create or update pull request
        if: steps.sync.outputs.changed == 'true' || github.event.inputs.force_sync == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          UPSTREAM_SHA=$(git rev-parse "upstream/${UPSTREAM_REF}" 2>/dev/null | cut -c1-7 || echo "unknown")

          PR_BODY="Automated exact-replica sync from \`${UPSTREAM_REPO}@${UPSTREAM_REF}\` (\`${UPSTREAM_SHA}\`). **Upstream always wins for framework files. Files deleted upstream are deleted here too.**

          Triggered by: \`${{ github.event_name }}\`

          **Always synced from upstream (exact replica):**
          \`.devcontainer/\` Â· \`.vscode/\` Â· \`.github/agents/\` Â· \`.github/skills/\` Â· \`.github/instructions/\`
          \`.github/prompts/\` Â· \`.github/data/\` Â· \`.github/workflows/\` Â· \`.github/copilot-instructions.md\`
          \`scripts/\` Â· \`mcp/azure-pricing-mcp/\` Â· \`agent-output/\` Â· \`docs/\` Â· \`infra/\` Â· root config files

          **Excluded (consumer-owned, never overwritten):**
          \`.github/workflows/weekly-upstream-sync.yml\` Â· \`README.md\` Â· \`CHANGELOG.md\` Â· \`VERSION.md\`
          \`CONTRIBUTING.md\` Â· \`CONTRIBUTORS.md\` Â· \`package.json\`

          > **Review note**: New upstream lint scripts in \`package.json\` won't appear here â€” check upstream diff manually.
          > Policy: always manual review, no auto-merge."

          # Update existing open PR or create new one
          EXISTING_PR=$(gh pr list \
            --repo "${{ github.repository }}" \
            --head "${SYNC_BRANCH}" \
            --state open \
            --json number \
            --jq '.[0].number' 2>/dev/null || echo "")

          if [ -n "$EXISTING_PR" ]; then
            echo "Updating existing PR #${EXISTING_PR}"
            gh pr edit "$EXISTING_PR" \
              --repo "${{ github.repository }}" \
              --body "$PR_BODY"
          else
            echo "Creating new PR"
            gh pr create \
              --repo "${{ github.repository }}" \
              --head "${SYNC_BRANCH}" \
              --base "${{ github.ref_name }}" \
              --title "chore(sync): upstream sync from ${UPSTREAM_REPO}" \
              --body "$PR_BODY" \
              --label "automation" \
              --label "upstream-sync"
          fi
